services:
  - type: web
    name: lgu-ims-online-database-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
      - key: MAX_UPLOAD_MB
        value: 50

